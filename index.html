<!DOCTYPE html>
<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nisarga Packaged Drinking Water</title>
  <link rel="stylesheet" href="styles.css">

<body>

  <div class="app-container">

    <!-- Top Bar -->

      <a href="index.html" class="brand-logo">
        <img src="logo.png" alt="Nisarga Logo"
          style="height: 48px; width: auto; object-fit: contain; border-radius: 4px;">
      </a>
    </header>

    <!-- Main Content -->
    <main class="content-area">

      <section class="hero animate-fade-in">
        <h1 style="font-size: 2.1rem; line-height: 1.2; margin-bottom: 4px;">Nisarga Packaged<br>Drinking Water</h1>
        <p class="subtitle">Processed by <strong>Sri Vinayaka Minerals</strong>.<br>Premium 20L water cans right to your
          doorstep for just ₹60.</p>

        <div class="image-wrapper animate-fade-in delay-1">
          <!-- Placeholder using a cool gradient/pattern or a placeholder image if needed. In real life we'd use a great product image -->
          <img
            src="https://images.unsplash.com/photo-1562016600-ece13e8ba570?w=600"

          <div class="image-overlay"></div>
        </div>
      </section>

      <div class="animate-fade-in delay-2">
        <a href="order.html" class="btn btn-primary">
          Order Now - ₹60/Can
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </a>
      </div>

      <section class="features-grid animate-fade-in delay-3">
        <div class="glass-card feature-item">
          <div class="feature-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
          </div>
          <h3>100% Pure</h3>
          <p>RO & UV purified crisp water.</p>
        </div>
        <div class="glass-card feature-item">
          <div class="feature-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </div>
          <h3>Express</h3>
          <p>Delivered within 30 minutes.</p>
        </div>
      </section>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item active">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>

      <a href="order.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
