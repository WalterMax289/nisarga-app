<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Order - Nisarga Packaged Drinking Water</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="styles.css">
  <meta name="description" content="Order Nisarga Packaged Drinking Water directly to your home. Processed by Sri Vinayaka Minerals.">
</head>
<body>

  <div class="app-container">
    
    <!-- Top Bar -->
    <header class="top-bar">
      <a href="index.html" class="brand-logo">
        <img src="logo.png" alt="Nisarga Logo" style="height: 48px; width: auto; object-fit: contain; border-radius: 4px;">
      </a>
    </header>

    <!-- Main Content -->
    <main class="content-area">
      <h2 class="animate-fade-in">Order Water</h2>
      
      <div class="glass-card animate-fade-in delay-1">
        <div class="input-group">
          <label>Quantity (20L Cans)</label>
          <div class="stepper">
            <button type="button" class="stepper-btn" id="btn-decrease">−</button>
            <input type="number" id="can-quantity" class="stepper-input" value="1" min="1" max="50" readonly>
            <button type="button" class="stepper-btn" id="btn-increase">+</button>
          </div>
        </div>

        <div class="order-summary">
          <div class="summary-label" style="display: flex; flex-direction: column;">
            <span>Total to pay</span>
            <span style="font-size: 0.8rem; opacity: 0.8; font-weight: 400;">₹60 per can</span>
          </div>
          <div class="summary-value" id="total-price">₹60</div>
        </div>
      </div>

      <div class="glass-card animate-fade-in delay-2" style="margin-top: 16px;">
        <div class="input-group" style="margin-bottom: 0;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <label for="address" style="margin-bottom: 0;">Delivery Address</label>
            <button type="button" class="btn btn-sm" id="btn-location">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
              Locate Me
            </button>
          </div>
          <div id="map" class="map-container" style="display: none;"></div>
          <textarea id="address" class="form-control" rows="3" placeholder="Enter your full address here..."></textarea>
          <label style="margin-top: 12px; display: flex; align-items: center; font-weight: 500; font-size: 0.9rem; cursor: pointer;">
            <input type="checkbox" id="save-address" style="width: 18px; height: 18px; margin-right: 8px; cursor: pointer;">
            Save this address for future orders
          </label>
        </div>
      </div>

      <div class="animate-fade-in delay-3" style="margin-top: 16px;">
        <button class="btn btn-primary" onclick="alert('Order placed successfully! Water is on the way.')">
          Confirm Order
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </button>
      </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>Home</span>
      </a>
      <a href="order.html" class="nav-item active">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <span>Order</span>
      </a>
      <a href="profile.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span>Profile</span>
      </a>
    </nav>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
